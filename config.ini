[display]
# Number of news cards visible at once (window height is auto-sized to fit)
visible_cards = 6

# Window width in pixels
window_width = 900

# Appearance mode: System, Light, or Dark
appearance = Dark

# Color theme: blue, green, or dark-blue
color_theme = blue

# Custom background color (hex). Leave empty to use the default theme color.
# Example: #C0609E (Enea blue)
#background_color = #000B2E
background_color = #4A4850

[scrolling]
# Milliseconds to show each card before advancing to the next
card_interval_ms = 3000

# Milliseconds to pause at the top before restarting the scroll
pause_top_ms = 3000

# How much each +/- keypress changes the interval (in milliseconds)
speed_step_ms = 500

# Minimum and maximum allowed interval (in milliseconds)
speed_min_ms = 500
speed_max_ms = 10000

# Keys to increase/decrease speed (faster = shorter interval, slower = longer)
# Use Tkinter key names: plus, minus, Up, Down, Left, Right, F1..F12, bracketleft, etc.
speed_faster_key = Right
speed_slower_key = Left

# Keys to manually jump to the previous/next card (also resets the auto-scroll timer)
prev_card_key = Up
next_card_key = Down


[feeds]
# Which source is checked by default on startup (must match a name below exactly)
default_source = BBC News

# Feed list: name = url
BBC News     = https://feeds.bbci.co.uk/news/rss.xml
AP News      = https://feeds.apnews.com/rss/apf-topnews
NPR News     = https://feeds.npr.org/1001/rss.xml
Ars Technica = https://feeds.arstechnica.com/arstechnica/index
The Verge    = https://www.theverge.com/rss/index.xml
Wired        = https://www.wired.com/feed/rss
Hacker News  = https://news.ycombinator.com/rss
TechCrunch   = https://techcrunch.com/feed/


[articles]
# Maximum characters shown in the description snippet
description_max_chars = 400

# Thumbnail size in pixels: width x height
thumbnail_width  = 140
thumbnail_height = 90
